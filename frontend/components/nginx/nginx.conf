# this conf file will suport a react app and a node.js server in the same server
# the react app will be served in the root path and the node.js server will be served in the /api path
# the react app will be served in the port 80 and the node.js server will be served in the port 3333
# also I will use certbot to get a ssl certificate for the domain

#react app
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;
    location / {
        try_files $uri /index.html;
    }
}

#node.js server
server {
    listen 3333;
    listen [::]:3333;
    server_name example.com www.example.com;
    location /api {
        proxy_pass http://localhost:3333;
    }
}

#ssl certificate
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name example.com www.example.com;
    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;
    location / {
        try_files $uri /index.html;
    }
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
}
```

## 4. Install certbot

```bash
sudo apt-get install certbot python3-certbot-nginx
```

## 5. Get the ssl certificate

```bash
sudo certbot --nginx -d example.com -d www.example.com
```

## 6. Test the configuration

```bash
sudo nginx -t
```

## 7. Restart nginx

```bash
sudo systemctl restart nginx
```

## 8. Check the status of nginx

```bash
sudo systemctl status nginx
```

## 9. Check the status of the node.js server

```bash
sudo systemctl status node
```

## 10. Check the status of the react app

```bash
sudo systemctl status nginx
```

## 11. Check the status of the ssl certificate

```bash
sudo systemctl status certbot.timer
```

## 12. Check the status of the firewall

```bash
sudo ufw status
```

## 13. Enable the firewall

```bash
sudo ufw enable
```

## 14. Allow the ports 80 and 443

```bash
sudo ufw allow 80
sudo ufw allow 443
```

## 15. Allow the port 3333

```bash
sudo ufw allow 3333
```

## 16. Check the status of the firewall

```bash
sudo ufw status
```





