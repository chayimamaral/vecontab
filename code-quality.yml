name: Code Quality

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Go quality checks
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Install Go tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Check Go formatting
        working-directory: ./backend
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Go files not formatted properly:"
            gofmt -l .
            exit 1
          fi

      - name: Run staticcheck
        working-directory: ./backend
        run: |
          staticcheck ./... || echo "Staticcheck found issues (non-blocking)"

      # Frontend quality checks
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Check TypeScript compilation
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: ./frontend
        run: yarn lint

      - name: Check Prettier formatting (if configured)
        working-directory: ./frontend
        run: |
          if [ -f ".prettierrc" ] || grep -q "prettier" package.json; then
            npx prettier --check . || echo "Prettier check failed (non-blocking)"
          else
            echo "Prettier not configured, skipping..."
          fi